<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    mobile.html — Phone camera streamer for "In Between the Stills"
    Captures camera at ~15fps and relays JPEG frames to the desktop via Socket.io.
    Supports front/rear flip with localStorage persistence.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>In Between the Stills — Camera</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* Camera preview fills most of the screen */
    #preview-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
      background: #0a0a0a;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Overlay label in the camera preview corner */
    #preview-label {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      pointer-events: none;
    }

    /* Bottom control bar */
    #controls {
      width: 100%;
      background: #111;
      border-top: 1px solid #222;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Connection status dot */
    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #status-dot.connected    { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    #status-dot.disconnected { background: #f87171; }
    #status-dot.connecting   { background: #facc15; }

    #status-text {
      font-size: 12px;
      color: #888;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #fps-counter {
      font-size: 11px;
      color: #444;
      min-width: 44px;
      text-align: right;
    }

    /* Flip / swap buttons */
    #flip-btn, #swap-btn {
      background: #222;
      color: #ccc;
      border: 1px solid #333;
      padding: 7px 14px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    #flip-btn:active, #swap-btn:active { background: #333; color: #fff; }
    #swap-btn.primary { border-color: #4ade80; color: #4ade80; }

    /* Error / permission message */
    #error-msg {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #f87171;
      font-size: 13px;
      text-align: center;
      padding: 20px;
      max-width: 280px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div id="preview-wrap">
    <video id="preview" autoplay playsinline muted></video>
    <div id="preview-label">camera</div>
    <p id="error-msg"></p>
  </div>

  <div id="controls">
    <div id="status-dot" class="connecting"></div>
    <span id="status-text">connecting…</span>
    <span id="fps-counter">— fps</span>
    <button id="swap-btn">⇄ swap</button>
    <button id="flip-btn">⟳ flip</button>
  </div>

  <!-- Socket.io client is auto-served by the Socket.io server -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── DOM refs ──────────────────────────────────────────────────────────
    const preview      = document.getElementById('preview')
    const statusDot    = document.getElementById('status-dot')
    const statusText   = document.getElementById('status-text')
    const fpsEl        = document.getElementById('fps-counter')
    const flipBtn      = document.getElementById('flip-btn')
    const swapBtn      = document.getElementById('swap-btn')
    const previewLabel = document.getElementById('preview-label')
    const errorMsg     = document.getElementById('error-msg')

    // Off-screen canvas used to convert video frame → JPEG dataURL
    const captureCanvas = document.createElement('canvas')
    const captureCtx    = captureCanvas.getContext('2d')

    // ── State ─────────────────────────────────────────────────────────────
    // Persist camera facing preference across page reloads
    let facingMode    = localStorage.getItem('facingMode') || 'environment'
    let currentStream = null   // MediaStream reference (for stopping tracks)
    let sendInterval  = null   // setInterval handle for the frame relay loop
    let isPrimary     = false  // whether phone is currently the base/primary camera

    // FPS counter bookkeeping
    let framesSent   = 0
    let fpsTimestamp = Date.now()

    // ── Socket.io ─────────────────────────────────────────────────────────
    const socket = io({ transports: ['websocket'] })

    socket.on('connect', () => {
      setStatus('connected', 'connected')
      // Announce to the server that this socket is the phone camera
      socket.emit('phone-register')
    })

    socket.on('disconnect', () => setStatus('disconnected', 'disconnected'))

    socket.on('connect_error', () => setStatus('disconnected', 'connection error'))

    function setStatus(dotClass, text) {
      statusDot.className = dotClass
      statusText.textContent = text
    }

    // ── Camera ────────────────────────────────────────────────────────────
    async function startCamera(facing) {
      // Release previous stream before opening a new one
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop())
        currentStream = null
      }

      errorMsg.style.display = 'none'

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        errorMsg.textContent = 'Camera not available. Open this page over HTTPS (not HTTP).'
        errorMsg.style.display = 'block'
        return
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: facing,
            width:  { ideal: 640 },
            height: { ideal: 480 },
          },
          audio: false,
        })
        currentStream  = stream
        preview.srcObject = stream
      } catch (err) {
        // Show a clear message if the user denied camera permission
        errorMsg.textContent =
          err.name === 'NotAllowedError'
            ? 'Camera permission denied.\nPlease allow camera access and reload.'
            : `Camera error: ${err.message}`
        errorMsg.style.display = 'block'
        console.error('Camera error:', err)
      }
    }

    // ── Frame relay loop (≈15 fps) ────────────────────────────────────────
    function startRelay() {
      if (sendInterval) clearInterval(sendInterval)

      sendInterval = setInterval(() => {
        // Skip if video isn't ready or socket is offline
        if (!preview.videoWidth || !preview.videoHeight) return
        if (!socket.connected) return

        // Draw current video frame to off-screen canvas, encode as JPEG
        captureCanvas.width  = preview.videoWidth
        captureCanvas.height = preview.videoHeight
        captureCtx.drawImage(preview, 0, 0)
        const dataURL = captureCanvas.toDataURL('image/jpeg', 0.5)

        // Emit with compression hint to the Socket.io transport layer
        socket.compress(true).emit('phone-frame', { dataURL })

        // FPS display: count frames per second
        framesSent++
        const now = Date.now()
        if (now - fpsTimestamp >= 1000) {
          fpsEl.textContent = `${framesSent} fps`
          framesSent   = 0
          fpsTimestamp = now
        }
      }, 66) // 1000ms / 15fps ≈ 66ms
    }

    // ── Flip button ───────────────────────────────────────────────────────
    flipBtn.addEventListener('click', () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment'
      localStorage.setItem('facingMode', facingMode)
      flipBtn.textContent = facingMode === 'environment' ? '⟳ flip' : '⟲ flip'
      startCamera(facingMode)
    })

    // ── Swap button — toggle phone as primary vs secondary camera ─────────
    swapBtn.addEventListener('click', () => {
      isPrimary = !isPrimary
      socket.emit('phone-swap')
      swapBtn.classList.toggle('primary', isPrimary)
      swapBtn.textContent = isPrimary ? '★ primary' : '⇄ swap'
      previewLabel.textContent = isPrimary ? 'camera · primary' : 'camera'
    })

    // ── Init ──────────────────────────────────────────────────────────────
    startCamera(facingMode)
    startRelay()
  </script>
</body>
</html>
